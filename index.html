<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthQuest: Bug Fix Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loginScreen" class="overlay">
        <div class="login-box">
            <h1>🛡️ HealthQuest</h1>
            <p>Acesse sua conta de Herói</p>
            <input type="email" id="userEmail" placeholder="E-mail">
            <input type="password" id="userPass" placeholder="Senha">
            <button onclick="login()" class="btn-main">Entrar na Jornada</button>
        </div>
    </div>

    <div class="app-container hidden" id="mainApp">
        <section class="habits-section">
            <h2>🟦 Minha Rotina</h2>
            <div class="habit-creator">
                <input type="text" id="habitInput" placeholder="Nome do hábito...">
                
                <div class="icon-selector" id="iconSelector">
                    <span class="icon-opt selected" data-icon="🏃">🏃</span>
                    <span class="icon-opt" data-icon="💧">💧</span>
                    <span class="icon-opt" data-icon="📚">📚</span>
                    <span class="icon-opt" data-icon="🍎">🍎</span>
                    <span class="icon-opt" data-icon="🧘">🧘</span>
                </div>

                <div class="difficulty-selector">
                    <label>Dificuldade:</label>
                    <select id="habitDifficulty">
                        <option value="1">Fácil (1⚡)</option>
                        <option value="2">Médio (2⚡)</option>
                        <option value="3">Difícil (3⚡)</option>
                    </select>
                </div>

                <div class="frequency-options">
                    <label><input type="radio" name="freq" value="daily" checked id="freqDaily"> Diário</label>
                    <label><input type="radio" name="freq" value="weekly" id="freqWeekly"> Semanal</label>
                </div>

                <div id="daysSelector" class="days-grid hidden">
                    <label><input type="checkbox" class="day-check" value="Seg"> Seg</label>
                    <label><input type="checkbox" class="day-check" value="Ter"> Ter</label>
                    <label><input type="checkbox" class="day-check" value="Qua"> Qua</label>
                    <label><input type="checkbox" class="day-check" value="Qui"> Qui</label>
                    <label><input type="checkbox" class="day-check" value="Sex"> Sex</label>
                    <label><input type="checkbox" class="day-check" value="Sáb"> Sáb</label>
                    <label><input type="checkbox" class="day-check" value="Dom"> Dom</label>
                </div>

                <button onclick="addHabit()" class="btn-main">Criar Hábito</button>
            </div>
            <ul id="habitList"></ul>
        </section>

        <section class="game-section">
            <div class="enemy-intent" id="intentBox">
                Próxima ação: <span id="intentText">???</span>
            </div>
            <div class="battle-screen">
                <div class="entity enemy">
                    <div id="enemyStatus" class="status-effects"></div>
                    <div class="hp-bar"><div id="enemyHp" style="width: 100%;"></div></div>
                    <span>👾 Boss Procrastinação</span>
                </div>
                <div class="entity player">
                    <div class="hp-bar"><div id="playerHp" style="width: 100%;"></div></div>
                    <span id="playerNameDisplay">Herói</span>
                    <div id="shieldDisplay" class="shield-badge">🛡️ 0</div>
                </div>
            </div>

            <div class="game-controls">
                <div class="stats">⚡ Energia: <span id="energyStat">0</span></div>
                <button onclick="endTurn()" class="btn-turn">Finalizar Turno</button>
            </div>
            <div class="hand" id="playerHand"></div>
            <p id="battleLog">Cumpra hábitos para lutar!</p>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
